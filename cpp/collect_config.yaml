upper_body:
  # Symlinks created by udev/99-uminoid-arms.rules (matched by FTDI serial).
  left_device:  "/dev/left_arm"
  right_device: "/dev/right_arm"
  baudrate: 1000000

inspire:
  # HAND_IDs assigned via set_inspire_id.py (run once per hand).
  # Factory default is 1; flash the right hand to 2.
  left_id: 1
  right_id: 2

# Optional view-only MJPEG preview of the RealSense RGB stream. Intended to be
# reached over Tailscale from another machine. Leave bind_host empty (or omit
# the whole block) to disable. Recommended: set bind_host to this host's
# tailscale0 IP so the stream is only reachable from the tailnet.
preview:
  bind_host: ""        # e.g. "100.84.51.76" (this host's Tailscale IP)
  port: 8080
  width: 320
  height: 240
  jpeg_quality: 40
  max_fps: 10
