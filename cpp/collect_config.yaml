relay: "127.0.0.1:5000"
is_simulation: false

upper_body:
  enabled: false
  source: "exo"   # "exo" = record exoskeleton arms, "g1" = teleoperate G1 and record robot joints
  left_device:  "/dev/left_arm"
  right_device: "/dev/right_arm"
  baudrate: 1000000
  network_interface: "lo"   # used when source == "g1" "enx00e04c6803fc"

inspire:
  enabled: true
  source: "usb"   # "usb" = direct serial to hands; "g1" = via G1 DDS bridge (inspire_g1)
  network_interface: "enx00e04c6803fc"  # used when source == "g1"
  left:
    enabled: true
    id: 1
  right:
    enabled: true
    id: 2

camera:
  enabled: false
  source: "usb"   # "usb" = local RealSense (UsbCameraRecorder); "zmq" = G1 head camera via realsense_raw_rgb.py (ZmqCameraRecorder)

# Optional view-only MJPEG preview of the RealSense RGB stream. Intended to be
# reached over Tailscale from another machine. Leave bind_host empty (or omit
# the whole block) to disable. Recommended: set bind_host to this host's
# tailscale0 IP so the stream is only reachable from the tailnet.
preview:
  bind_host: "127.0.0.1"           # loopback: only the local tmux mpv pane consumes it
  port: 8080
  width: 320
  height: 240
  jpeg_quality: 40
  max_fps: 10
